<!DOCTYPE html>
<html>
<head>
  <title>Cinematic Story ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      overflow: hidden;
    }

    /* 🎬 INTRO */
    .intro {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
      animation: fadeOut 2s ease 3s forwards;
    }

    .intro h1 {
      font-size: 40px;
      color: #ff4d6d;
      animation: zoom 2s ease;
    }

    .intro p {
      color: #aaa;
      opacity: 0;
      animation: fadeIn 2s ease 1s forwards;
    }

    @keyframes zoom {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* 🎬 HERO */
    .hero {
      height: 100vh;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.3)),
                  url("namu.jpg") center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 55px;
      color: #ff4d6d;
      margin: 0;
    }

    .hero p {
      font-size: 18px;
      max-width: 500px;
      opacity: 0.9;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 30px;
      cursor: pointer;
    }

    /* 🎞️ SECTIONS */
    .section {
      padding: 40px;
    }

    .row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }

    .card {
      min-width: 180px;
      height: 100px;
      background: #1c1c1c;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .img-card {
      min-width: 180px;
      height: 100px;
      border-radius: 10px;
      background: url("namu.jpg") center/cover;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: gray;
    }

    /* 💖 HEARTS */
    .heart {
      position: fixed;
      bottom: -20px;
      font-size: 18px;
      color: rgba(255, 105, 135, 0.7);
      animation: floatUp linear forwards;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-110vh); opacity: 0; }
    }
  </style>
</head>

<body>

<!-- 🎬 INTRO -->
<div class="intro">
  <h1>LOADING STORY</h1>
  <p>A cinematic experience is starting...</p>
</div>

<!-- 💖 HEART SCRIPT -->
<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");

  const emojis = ["❤️","💖","💕","💗"];
  heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (14 + Math.random() * 18) + "px";
  heart.style.animationDuration = (5 + Math.random() * 4) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 9000);
}
setInterval(createHeart, 400);
</script>

<!-- 🎬 HERO -->
<div class="hero">
  <h1>My Cinematic Story ❤️</h1>
  <p>A Netflix-style memory website with love and moments</p>
  <button class="btn" onclick="alert('You are special ❤️')">Play</button>
</div>

<!-- 🎞️ MEMORIES -->
<div class="section">
  <h2>Memories</h2>
  <div class="row">
    <div class="card">Moment 1</div>
    <div class="card">Moment 2</div>
    <div class="img-card"></div>
    <div class="card">Moment 3</div>
  </div>
</div>

<!-- 🎞️ FEELINGS -->
<div class="section">
  <h2>Feelings</h2>
  <div class="row">
    <div class="card">Love</div>
    <div class="card">Care</div>
    <div class="card">Trust</div>
    <div class="card">Happiness</div>
  </div>
</div>

<footer>
  Made with ❤️
</footer>

</body>
</html>
